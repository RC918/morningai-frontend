<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning AI - 智能AI代理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 2rem;
        }
        
        .status-item {
            margin: 10px 0;
            font-size: 1.1rem;
        }
        
        .success {
            color: #4ade80;
            font-weight: bold;
        }
        
        .api-status {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.9;
        }
        
        .version-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .build-id {
            font-family: 'Monaco', 'Menlo', monospace;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .logo { font-size: 3rem; }
            .subtitle { font-size: 1.1rem; }
            .version-info { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="container">
            <div class="logo">🌅</div>
            <h1>Morning AI</h1>
            <p class="subtitle">
                歡迎來到 Morning AI - 您的智能助手，為您開啟高效的一天。
            </p>
            
            <div class="status">
                <div class="status-item">
                    🚀 系統狀態: <span class="success">線上運行</span>
                </div>
                <div class="status-item">
                    📅 今日日期: <span id="current-date"></span>
                </div>
                <div class="status-item">
                    ⏰ 當前時間: <span id="current-time"></span>
                </div>
                <div class="status-item">
                    🔒 SSL 狀態: <span class="success">安全連接</span>
                </div>
                <div class="status-item">
                    🌐 API 連接: <span id="api-status" class="success">檢查中...</span>
                </div>
                
                <div class="api-status" id="api-details">
                    正在檢查 API 連接狀態...
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="version-info">
            <div>
                <strong>Morning AI</strong> | 環境: Production
            </div>
            <div class="build-id" id="build-id">
                Build: 載入中...
            </div>
            <div>
                © 2025 Morning AI. All rights reserved.
            </div>
        </div>
    </div>
    
    <script>
        function updateDateTime() {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-TW');
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-TW');
        }
        
        async function loadVersionInfo() {
            try {
                const response = await fetch('/version.json?t=' + Date.now());
                const versionData = await response.json();
                
                if (response.ok) {
                    document.getElementById('build-id').textContent = `Build: ${versionData.build_id}`;
                    
                    // 設置全局版本信息
                    window.morningAI = {
                        ...versionData,
                        loaded_at: new Date().toISOString()
                    };
                    
                    console.log('版本信息載入成功:', window.morningAI);
                } else {
                    throw new Error('版本信息載入失敗');
                }
            } catch (error) {
                console.error('版本信息載入錯誤:', error);
                document.getElementById('build-id').textContent = 'Build: 載入失敗';
            }
        }
        
        async function checkApiStatus() {
            try {
                const response = await fetch('https://api.morningai.me/healthz');
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('api-status').textContent = '正常連接';
                    document.getElementById('api-status').className = 'success';
                    document.getElementById('api-details').innerHTML = `
                        ✅ API 健康檢查通過<br>
                        📊 狀態: ${data.status}<br>
                        🏷️  版本: ${data.version}<br>
                        🌍 環境: ${data.environment}
                    `;
                } else {
                    throw new Error('API 響應錯誤');
                }
            } catch (error) {
                document.getElementById('api-status').textContent = '連接異常';
                document.getElementById('api-status').style.color = '#f87171';
                document.getElementById('api-details').innerHTML = `
                    ❌ API 連接失敗<br>
                    錯誤: ${error.message}
                `;
            }
        }
        
        // 初始化
        updateDateTime();
        setInterval(updateDateTime, 1000);
        loadVersionInfo();
        checkApiStatus();
        
        console.log('Morning AI 已載入');
    </script>
</body>
</html>
